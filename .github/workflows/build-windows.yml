name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      cuda:
        description: "Bundle CUDA-enabled PyTorch (much larger build)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180

    env:
      # Default to CUDA for push/tag builds; allow opting out via workflow_dispatch.
      CUDA_ENABLED: ${{ (github.event_name == 'workflow_dispatch' && inputs.cuda == false) && 'false' || 'true' }}
      TORCH_CUDA_INDEX: https://download.pytorch.org/whl/cu124

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reclaim disk space (CUDA bundles are large)
        shell: pwsh
        continue-on-error: true
        run: |
          $targets = @(
            "C:\Android",
            "$env:ANDROID_HOME",
            "$env:ANDROID_SDK_ROOT",
            "C:\Program Files (x86)\Android",
            "C:\hostedtoolcache\windows\Ruby",
            "C:\hostedtoolcache\windows\go"
          )
          foreach ($t in $targets) {
            if ($t -and (Test-Path $t)) {
              Write-Host "Removing $t"
              Remove-Item -Recurse -Force $t -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Format-Table -AutoSize

      - name: Install backend dependencies
        shell: pwsh
        working-directory: backend
        run: |
          python -m pip install --upgrade pip wheel setuptools

          if ($env:CUDA_ENABLED -eq 'true') {
            Write-Host "Installing CUDA-enabled PyTorch from $env:TORCH_CUDA_INDEX"
            pip install --no-cache-dir torch torchaudio --index-url $env:TORCH_CUDA_INDEX
          }

          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pyinstaller

          if ($env:CUDA_ENABLED -eq 'true') {
            # Ensure the CUDA build wins even if a dependency pulled the CPU wheel.
            pip install --no-cache-dir --force-reinstall --no-deps torch torchaudio --index-url $env:TORCH_CUDA_INDEX
          }

          python -c "import torch; print('torch', torch.__version__, 'cuda build:', torch.version.cuda)"

      - name: Bundle backend with PyInstaller
        shell: pwsh
        working-directory: backend
        run: |
          pyinstaller --noconfirm --clean cutscript-backend.spec
          if (-not (Test-Path "dist/cutscript-backend/cutscript-backend.exe")) {
            throw "Backend bundle missing: dist/cutscript-backend/cutscript-backend.exe"
          }

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          New-Item -ItemType Directory -Force -Path build/ffmpeg | Out-Null
          $ffmpeg = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg) { throw "ffmpeg.exe not found in download" }
          Copy-Item $ffmpeg.FullName build/ffmpeg/
          if ($ffprobe) { Copy-Item $ffprobe.FullName build/ffmpeg/ }
          Get-ChildItem build/ffmpeg

      - name: Build frontend
        shell: pwsh
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install root dependencies
        shell: pwsh
        run: npm install

      - name: Build Windows installer (electron-builder)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CutScript-Windows-Installer
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 14
