name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      cuda:
        description: "Bundle CUDA-enabled PyTorch (much larger build)"
        type: boolean
        default: false
      release_tag:
        description: "If set, attach the built artifact to this release tag (e.g. v0.1.0)"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  # Include the event so a manual CUDA dispatch isn't cancelled by a push CI run.
  group: build-windows-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180

    env:
      # CPU-only by default for fast iteration; opt into CUDA via workflow_dispatch.
      CUDA_ENABLED: ${{ (github.event_name == 'workflow_dispatch' && inputs.cuda == true) && 'true' || 'false' }}
      # cu126 ships modern torch (>=2.7 has float8_e8m0fnu), keeping the CUDA
      # build in sync with the CPU/PyPI torch that transformers expects.
      TORCH_CUDA_INDEX: https://download.pytorch.org/whl/cu126

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reclaim disk space (CUDA bundles are large)
        if: env.CUDA_ENABLED == 'true'
        shell: pwsh
        continue-on-error: true
        run: |
          $targets = @(
            "C:\Android",
            "$env:ANDROID_HOME",
            "$env:ANDROID_SDK_ROOT",
            "C:\Program Files (x86)\Android",
            "C:\hostedtoolcache\windows\Ruby",
            "C:\hostedtoolcache\windows\go"
          )
          foreach ($t in $targets) {
            if ($t -and (Test-Path $t)) {
              Write-Host "Removing $t"
              Remove-Item -Recurse -Force $t -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Format-Table -AutoSize

      - name: Install backend dependencies
        shell: pwsh
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # faster-whisper and ctranslate2 import pkg_resources at runtime, which
          # newer setuptools no longer ships. Pin to a version that still has it.
          pip install "setuptools<81" wheel

          if ($env:CUDA_ENABLED -eq 'true') {
            Write-Host "Installing CUDA-enabled PyTorch from $env:TORCH_CUDA_INDEX"
            pip install --no-cache-dir torch==2.7.1 torchaudio==2.7.1 --index-url $env:TORCH_CUDA_INDEX
          }

          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pyinstaller

          if ($env:CUDA_ENABLED -eq 'true') {
            # Ensure the CUDA build wins even if a dependency pulled the CPU wheel.
            pip install --no-cache-dir --force-reinstall --no-deps torch==2.7.1 torchaudio==2.7.1 --index-url $env:TORCH_CUDA_INDEX
            # whisperx pins ctranslate2<4.5 (cuDNN 8); force the cuDNN 9 build to
            # match torch cu126, else GPU fails with "cudnn_ops_infer64_8.dll not found".
            pip install --no-cache-dir --force-reinstall --no-deps "ctranslate2>=4.5.0"
            python -c "import importlib.metadata as m; print('ctranslate2', m.version('ctranslate2'))"
          }

          python -c "import torch; print('torch', torch.__version__, 'cuda build:', torch.version.cuda)"

      - name: Bundle backend with PyInstaller
        shell: pwsh
        working-directory: backend
        run: |
          pyinstaller --noconfirm --clean cutscript-backend.spec
          if (-not (Test-Path "dist/cutscript-backend/cutscript-backend.exe")) {
            throw "Backend bundle missing: dist/cutscript-backend/cutscript-backend.exe"
          }

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          New-Item -ItemType Directory -Force -Path build/ffmpeg | Out-Null
          $ffmpeg = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg) { throw "ffmpeg.exe not found in download" }
          Copy-Item $ffmpeg.FullName build/ffmpeg/
          if ($ffprobe) { Copy-Item $ffprobe.FullName build/ffmpeg/ }
          # Ship ffmpeg next to the backend exe so it's always discoverable
          # (run_server.py prepends the executable's dir to PATH).
          Copy-Item $ffmpeg.FullName backend/dist/cutscript-backend/
          if ($ffprobe) { Copy-Item $ffprobe.FullName backend/dist/cutscript-backend/ }
          Get-ChildItem build/ffmpeg

      - name: Smoke-test bundled backend (engine imports + transcription)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "backend/dist/cutscript-backend/cutscript-backend.exe"
          if (-not (Test-Path $exe)) { throw "missing $exe" }

          # whisperx/moviepy shell out to ffmpeg; make the bundled copy visible.
          $env:PATH = "$((Resolve-Path 'build/ffmpeg').Path);$env:PATH"

          $out = Join-Path $env:RUNNER_TEMP "be_out.txt"
          $err = Join-Path $env:RUNNER_TEMP "be_err.txt"
          $proc = Start-Process -FilePath $exe `
            -ArgumentList "--host","127.0.0.1","--port","8642" `
            -PassThru -WindowStyle Hidden `
            -RedirectStandardOutput $out -RedirectStandardError $err
          try {
            # 1) liveness
            $healthy = $false
            for ($i=0; $i -lt 60; $i++) {
              try { if ((Invoke-RestMethod "http://127.0.0.1:8642/health" -TimeoutSec 3).status -eq 'ok') { $healthy = $true; break } } catch {}
              Start-Sleep 2
            }
            if (-not $healthy) { throw "backend did not become healthy" }

            # 2) the ML engine must actually import (this is what catches missing
            #    bundled deps like imageio / matplotlib).
            $engineOk = $false
            for ($i=0; $i -lt 180; $i++) {
              $r = $null
              try { $r = Invoke-RestMethod "http://127.0.0.1:8642/ready" -TimeoutSec 5 } catch {}
              if ($r) {
                Write-Host "engine state: $($r.state)"
                if ($r.state -eq 'ready') { $engineOk = $true; break }
                if ($r.state -eq 'error') { throw "ENGINE IMPORT FAILED: $($r.detail)" }
              }
              Start-Sleep 3
            }
            if (-not $engineOk) { throw "engine did not become ready in time" }
            Write-Host "PASS: transcription engine imported"

            # 3) real end-to-end transcription on actual speech (exercises the
            #    full runtime path: ffmpeg decode -> VAD -> model -> alignment).
            #    Generate speech with Windows' built-in SAPI TTS (no extra dep);
            #    a pure tone would yield no VAD segments and isn't a real test.
            $wav = Join-Path $env:RUNNER_TEMP "smoke.wav"
            Add-Type -AssemblyName System.Speech
            $synth = New-Object System.Speech.Synthesis.SpeechSynthesizer
            $synth.SetOutputToWaveFile($wav)
            $synth.Speak("The quick brown fox jumps over the lazy dog. Testing one two three four.")
            $synth.Dispose()
            if (-not (Test-Path $wav)) { throw "failed to generate test audio" }

            $body = @{ file_path = $wav; model = "tiny"; language = "en"; use_cache = $false } | ConvertTo-Json
            $resp = Invoke-RestMethod "http://127.0.0.1:8642/transcribe" -Method Post -ContentType "application/json" -Body $body -TimeoutSec 900
            if ($null -eq $resp.PSObject.Properties['words']) {
              throw "transcription response missing 'words': $($resp | ConvertTo-Json -Depth 4)"
            }
            if ($resp.words.Count -lt 1) {
              throw "transcription produced no words from speech audio: $($resp | ConvertTo-Json -Depth 4)"
            }
            $text = ($resp.words | ForEach-Object { $_.word }) -join ' '
            Write-Host "PASS: end-to-end transcription ran ($($resp.words.Count) words): $text"

            # 4) /preview must turn a non-MP4 container (.mkv) into a playable MP4.
            $mkv = Join-Path $env:RUNNER_TEMP "smoke.mkv"
            ffmpeg -y -f lavfi -i "testsrc=size=320x240:rate=10:duration=2" -f lavfi -i "sine=frequency=440:duration=2" -c:v libx264 -c:a aac -shortest "$mkv" | Out-Null
            if (-not (Test-Path $mkv)) { throw "failed to generate test mkv" }
            $enc = [uri]::EscapeDataString($mkv)
            $pvOut = Join-Path $env:RUNNER_TEMP "preview.mp4"
            Invoke-WebRequest "http://127.0.0.1:8642/preview?path=$enc" -OutFile $pvOut -TimeoutSec 180
            $sz = (Get-Item $pvOut).Length
            if ($sz -lt 1000) { throw "/preview produced too little data ($sz bytes)" }
            $pAudio = (& ffprobe -v error -select_streams a -show_entries stream=codec_name -of csv=p=0 "$pvOut")
            if (-not $pAudio) { throw "/preview output has NO audio stream (would be silent)" }
            Write-Host "PASS: /preview produced playable mp4 ($sz bytes, audio=$pAudio)"

            # 5) /audio must extract a decodable WAV (used by the waveform).
            $aOut = Join-Path $env:RUNNER_TEMP "audio.wav"
            Invoke-WebRequest "http://127.0.0.1:8642/audio?path=$enc" -OutFile $aOut -TimeoutSec 120
            $asz = (Get-Item $aOut).Length
            if ($asz -lt 1000) { throw "/audio produced too little data ($asz bytes)" }
            Write-Host "PASS: /audio extracted wav ($asz bytes)"
          }
          finally {
            if ($proc -and -not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
            Write-Host "----- backend stdout -----"; Get-Content $out -Tail 60 -ErrorAction SilentlyContinue
            Write-Host "----- backend stderr -----"; Get-Content $err -Tail 60 -ErrorAction SilentlyContinue
          }

      - name: Trim CUDA bundle (safe) and report sizes
        if: env.CUDA_ENABLED == 'true'
        shell: pwsh
        run: |
          $dist = "backend/dist/cutscript-backend"
          $before = (Get-ChildItem $dist -Recurse -File | Measure-Object Length -Sum).Sum
          Write-Host ("Before trim: {0:N0} MB" -f ($before/1MB))

          # Safe removals only: import libs, debug symbols, caches, test dirs,
          # and the CUDA profiler (cupti) which isn't needed for inference.
          Get-ChildItem $dist -Recurse -File -Include *.lib,*.pdb,*.exp -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem $dist -Recurse -Directory -Include __pycache__,tests,test -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem $dist -Recurse -File -Include cupti*.dll,*nvperf*.dll -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue

          $after = (Get-ChildItem $dist -Recurse -File | Measure-Object Length -Sum).Sum
          Write-Host ("After trim:  {0:N0} MB" -f ($after/1MB))
          Write-Host "=== 30 largest remaining files ==="
          Get-ChildItem $dist -Recurse -File | Sort-Object Length -Descending | Select-Object -First 30 | ForEach-Object {
            "{0,9:N1} MB  {1}" -f ($_.Length/1MB), $_.FullName.Substring((Resolve-Path $dist).Path.Length)
          }

      - name: Build frontend
        shell: pwsh
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install root dependencies
        shell: pwsh
        run: npm install

      - name: Build Windows installer (electron-builder)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The CUDA bundle is multi-GB; NSIS's 32-bit makensis can't mmap the
          # >2GB app archive. Ship CUDA as a 7z (best compression, aiming to fit
          # under GitHub's 2GiB release-asset limit); CPU stays an NSIS installer.
          $target = if ($env:CUDA_ENABLED -eq 'true') { '7z' } else { 'nsis' }
          Write-Host "electron-builder target: $target"
          npx electron-builder --win $target --x64 --publish never
          Write-Host "=== dist artifacts ==="
          Get-ChildItem dist -File | ForEach-Object { "{0,9:N1} MB  {1}" -f ($_.Length/1MB), $_.Name }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CutScript-Windows-${{ env.CUDA_ENABLED == 'true' && 'cuda' || 'cpu' }}
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.7z
          if-no-files-found: error
          retention-days: 14

      - name: Publish to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.7z
          fail_on_unmatched_files: false
